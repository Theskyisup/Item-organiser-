<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/cssP/Looksnice.css">
<title>Sign Up</title>
</head>
<body>
<div class="side-sidebar side-bar-block side-border-right" id="mySidebar">
  <button onclick="side_close()" class="side-bar-item side-large side-button side-teal">Close &times;</button>
  <a href="/" class="side-bar-item side-button">Home</a>
  <a href="/log" class="side-bar-item side-button">Login</a>
  <a href="/signup" class="side-bar-item side-button">Signup</a>
</div>
<div id="sidebarOverlay" onclick="side_close()"></div>
<div class="navbar">
  <button class="side-button side-teal side-xlarge menu-toggle" onclick="side_open()">☰</button>
  <a href="/">Home</a>
  <div class="navbar-right">
    <a href="/log">Login</a>
    <a href="/signup">Create account</a>
    <a href="#Help">Feedback account</a>
  </div>
</div>
<div class="main">
  <h3>Create an account</h3>
  {% if created %}
    <p style="color:green">Account created for <strong>{{ created }}</strong></p>
    <p><a href="/log">Back to login</a></p>
  {% endif %}
  {% if error %}
    <p style="color:red">{{ error }}</p>
  {% endif %}
  <form method="post">
    <label>Username</label>
    <input type="text" name="newusername" required>
    <br><br>
    <label>Password</label>
    <input type="password" name="newpassword" required>
    <br><br>
    <input type="submit" value="Submit">
  </form>
  <p>Already have an account? <a href="/log">Log in here</a></p>
</div>
<script src="/static/js/site.js"></script>
</body>
</html>
